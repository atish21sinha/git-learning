<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <fieldset>
        <legend>IIT JEE REGISTRATION</legend>
    <FORM>
        <!-- FULL NAME-->
         <label for="name">Full name</label>
         <input type="text" id="name" name="fname">
         <br>
         <br>
         <!--email-->
         <label for="email">Email:</label>
         <input type="email" id="email" name="email">
         <br>
         <br>
         <!--phone-->
         <label for="contact">Phone:</label>
         <input type="tel" name="phone" id="contact">
         <br>
         <br>
         <!--password-->
         <label for="pass">Password</label>
         <input type="password" name="password" id="password">
         <br>
         <br>
         <!--gender-->
         <label>Gender:</label>
         <input type="radio" id="male" name="gender">
<label for="male">Male:</label>
<input type="radio" id="female" name="gender">
<label for="female">Female:</label>
<br>
<br>
<!--dob-->
<label for="date">DOB</label>
<input type="date" id="date" name="Dob" min="2001-01-01" max="2005-01-01">
<br>
<br>
<!--Bord-->
<label for="board">Board:</label>
<select name="board" id="board">
    <option value=""disabled selected>Select your board</option>

<option value="Board">CBSE</option>
<option value="">BIHAR </option>
<option value="">UP</option>
<option value="">UK</option>
</select>
<br>
<br>
<!--year of pursuing-->
<label for="year">Year</label>
<input type="number" id="year" name="year" min="2023" max="2025">
<br>
<br>
<!--exam  center-->
<label for="center">Exam center:</label>
<select name="center" id="center">
    <option value=""disabled selected>SELECT YOUR CITY</option>
    <option value="">DELHI</option>
     <option value="">KOLKATA</option>
      <option value="">MUMBAI</option>
       <option value="">GOA</option>
       </select>
       <br>
       <br>
       <button>Register</button>
       











</select>







</FORM>
</fieldset>
    
</body>
</html>
